<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share Your Story | AnchorLight</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/share.css">

</head>

<body>

<header class="navbar">

    <div class="logo">
        <img src="images/logo.png" alt="AnchorLight">
        <h1>AnchorLight</h1>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="stories.html">Stories</a></li>
            <li><a href="daily-beacon.html">Daily Beacon</a></li>
            <li><a href="resources.html">Resources</a></li>
        </ul>
    </nav>

</header>

<section class="page-hero">

    <div class="container">

        <h1>Share Your Story</h1>

        <p>
            Your story could be the hope someone else needs today.
        </p>

    </div>

</section>

<section class="container">

<form id="storyForm" class="story-form">

    <label>Your Name</label>

    <input
        type="text"
        id="author"
        placeholder="Your name (optional)">

    <label class="checkbox">

        <input
            type="checkbox"
            id="anonymous">

        Post my story anonymously

    </label>

    <label>Story Title</label>

    <input
        type="text"
        id="title"
        required>

    <label>Category</label>

    <select id="category" required>

        <option value="">Select a Category</option>

        <option value="Recovery">Recovery</option>

        <option value="Alcohol">Alcohol</option>

        <option value="Drugs">Drugs</option>

        <option value="Mental Health">Mental Health</option>

        <option value="Depression">Depression</option>

        <option value="Anxiety">Anxiety</option>

        <option value="Family">Family</option>

        <option value="Hope">Hope</option>

        <option value="Faith">Faith</option>

    </select>

    <label>Recovery Length (Optional)</label>

    <input
        type="text"
        id="recoveryLength"
        placeholder="Example: 18 months or 5 years">

    <label>Your Story</label>

    <textarea
        id="message"
        rows="12"
        required
        placeholder="Share your journey..."></textarea>

    <label class="checkbox">

        <input
            type="checkbox"
            id="triggerWarning">

        This story contains potentially triggering content.

    </label>

    <label class="checkbox">

        <input
            type="checkbox"
            id="consent"
            required>

        I understand my story may be reviewed and published by AnchorLight.

    </label>

    <button
        type="submit"
        class="primary-btn">

        Submit Story

    </button>

</form>

<div id="status"></div>

</section>

<footer>

<div class="copyright">

© 2026 AnchorLight • Find Your Way Back

</div>

</footer>

<script type="module" src="js/share.js"></script>

</body>

</html>
