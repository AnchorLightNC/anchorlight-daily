
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnchorLight Story Publisher</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:40px auto;
    padding:20px;
    background:#07111f;
    color:white;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

textarea{
    min-height:180px;
}

button{
    background:#FFD166;
    color:#07111f;
    border:none;
    padding:14px 24px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

pre{
    margin-top:25px;
    background:#10243d;
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
    word-break:break-word;
}
</style>
</head>

<body>

<h1>🌟 Story Publisher</h1>

<input id="title" placeholder="Story Title">

<input id="author" placeholder="Author">

<input id="recovery" placeholder="Recovery Time">

<input id="date" placeholder="Date (Example: July 2026)">

<label>
<input id="featured" type="checkbox">
 Featured Story
</label>

<textarea id="story" placeholder="Paste the story here..."></textarea>

<button onclick="generateJSON()">
Generate Story
</button>

<h2>Copy this into stories.json</h2>

<pre id="output"></pre>

<script>

function generateJSON(){

const story={

title:document.getElementById("title").value,

author:document.getElementById("author").value || "Anonymous",

recovery:document.getElementById("recovery").value,

date:document.getElementById("date").value,

featured:document.getElementById("featured").checked,

story:document.getElementById("story").value

};

document.getElementById("output").textContent=
JSON.stringify(story,null,2);

}

</script>

</body>
</html>
