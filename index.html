<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnchorLight Daily | Find Your Way Back</title>

  <link rel="stylesheet" href="style.css">

  <meta name="description" content="Daily encouragement, recovery inspiration, mental wellness, and hope from AnchorLight.">

</head>

<body>

<div class="background">

  <div class="stars"></div>

  <div class="beam"></div>

  <div class="ocean"></div>

</div>

<header>

  <h1>⚓ AnchorLight Daily</h1>

  <p class="tagline">
    Find Your Way Back
  </p>

</header>

<main class="card">

  <div id="date" class="date">
    Loading...
  </div>

  <h2 id="title">
    Loading...
  </h2>

  <blockquote id="quote">
    Loading today's encouragement...
  </blockquote>

  <section>

    <h3>🌊 Reflection</h3>

    <p id="reflection"></p>

  </section>

  <section>

    <h3>💪 Today's Challenge</h3>

    <p id="challenge"></p>

  </section>

  <section id="verseBox">

    <h3>📖 Scripture</h3>

    <p id="verse"></p>

  </section>

  <section>

    <h3>⚓ Anchor Thought</h3>

    <p id="anchorThought"></p>

  </section>

  <section>

    <h3>🙏 Anchor Prayer</h3>

    <p id="anchorPrayer"></p>

  </section>

  <section>

    <h3>📔 Captain's Log</h3>

    <p id="captainsLog"></p>

  </section>

  <section>

    <h3>🌅 Tomorrow's Heading</h3>

    <p id="tomorrowsHeading"></p>

  </section>

  <div class="buttons">

    <button onclick="copyQuote()">
      📋 Copy Quote
    </button>

    <button onclick="shareQuote()">
      📤 Share
    </button>

  </div>

</main>

<footer>

  
</footer>

<script src="app.js"></script>

</body>
</html>
