<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnchorLight Daily</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <h1>⚓ AnchorLight Daily</h1>
  <p class="tagline">Find Your Way Back.</p>

  <div id="date"></div>
  <h2 id="title"></h2>
  <blockquote id="quote">Loading...</blockquote>

  <section>
    <h3>Today's Reflection</h3>
    <p id="reflection"></p>
  </section>

  <section>
    <h3>Today's Challenge</h3>
    <p id="challenge"></p>
  </section>

  <section id="verseBox" style="display:none;">
    <h3>Verse of the Day</h3>
    <p id="verse"></p>
  </section>

  <div class="buttons">
    <button onclick="copyQuote()">Copy Quote</button>
    <button onclick="shareQuote()">Share</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
